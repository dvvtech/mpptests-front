<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>МПП тесты Яшара Ибадова</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Literata:opsz,wght@7..72,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
            display: ['Literata', 'serif']
          },
          boxShadow: {
            soft: '0 20px 60px rgba(15, 23, 42, 0.14)'
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/utils.js" defer></script>
  <script src="js/statistics.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/canvas.js" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>
  <div class="app-backdrop"></div>
  <main id="app-shell" class="relative z-10 h-screen w-full overflow-hidden px-3 py-3 md:px-6 md:py-5">
    <section id="settings" class="app-section"></section>
    <section id="coloring" class="app-section hidden"></section>
  </main>

  <div id="toast-root" class="toast-root"></div>

  <div id="modal-root" class="modal-root hidden" aria-hidden="true">
    <div class="modal-card surface-panel">
      <div class="flex items-start justify-between gap-4">
        <div>
          <p id="modal-title" class="text-lg font-semibold text-slate-900"></p>
          <p id="modal-message" class="mt-2 text-sm leading-6 text-slate-600"></p>
        </div>
        <button id="modal-close" type="button" class="icon-button" aria-label="Закрыть">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div id="modal-actions" class="mt-6 flex flex-wrap justify-end gap-3"></div>
    </div>
  </div>

  <div id="global-loading" class="loading-overlay hidden" aria-live="polite" aria-busy="false">
    <div class="surface-panel flex items-center gap-4 px-5 py-4">
      <span class="loader-ring"></span>
      <div>
        <p class="text-sm font-semibold text-slate-900">Пожалуйста, подождите</p>
        <p id="loading-text" class="text-sm text-slate-600">Загрузка интерфейса...</p>
      </div>
    </div>
  </div>
</body>
</html>
